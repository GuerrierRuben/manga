<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Production - ScanOtaku</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100-vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            color: #ff4d4d;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 10px 30px;
            background: #ff4d4d;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover {
            background: #e60000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Site en cours de production</h1>
        <p>Nous travaillons dur pour vous offrir la meilleure expérience de lecture de manga.</p>
        <p>Revenez bientôt !</p>
        <a href="index.html" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
