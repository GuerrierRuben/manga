<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,800;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-container {
            max-width: 1200px;
            margin: 120px auto 50px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .product-image-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-image-container:hover img {
            transform: scale(1.05);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-info h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-price-details {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffcc00;
            margin-bottom: 20px;
        }

        .product-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 30px;
        }

        .details-rating {
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        .details-rating .checked {
            color: #ffcc00;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .btn-details {
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: #ffcc00;
            color: #111;
        }

        .btn-add:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        .btn-back {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
        }

        .btn-back:hover {
            background: #fff;
            color: #111;
        }

        @media (max-width: 992px) {
            .details-container {
                grid-template-columns: 1fr;
                margin-top: 100px;
            }
        }
    </style>
    <title>Détails du Produit - EcomerceToolkit</title>
</head>
<body>
    <header>
        <nav>
            <p class="logo"><img src="Ecommerce/eco-removebg-preview.png"></p>
            <div class="navbar">
            <a href="index.html">Home</a>
            <a href="#">Shop</a>
            <a href="#">Terms</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            </div>
            <div class="add-card">
                <a href="#"><i class='bx bx-search'></i></a>
                <a href="#"><i class='bx bxs-cart'></i></a>
                <a href="#"><i class='bx bx-log-in'></i></a>
                <a class="menu"><div class="menu-toggle"><i class='bx bx-menu-alt-right'></i></div></a>
            </div>
         </nav>
    </header>

    <main class="details-container" id="product-details">
        <!-- Contenu dynamique chargé par details.js -->
        <div class="loading">Chargement des détails...</div>
    </main>

    <footer>
        <div class="main-content">
          <div class="left box">
            <h2>About us</h2>
            <div class="content">
                <p>Come Shopping in your store</p>
              <div class="partie">
                <div class="contact-reseau">
                <ul>
                    <a href="#"><li><i class='bx bxl-facebook'></i></li></a>
                    <a href="#"><li><i class='bx bxl-instagram'></i></li></a>
                    <a href="#"><li><i class='bx bxl-whatsapp'></i></li></a>
                    <a href="#"><li><i class='bx bxl-linkedin'></i></li></a>
                </ul>
            </div>
              </div>
            </div>
          </div>
  
          <div class="center box">
            <h2>Quicks Link</h2>
            <div class="content">
              <div class="place">
                <span class="text"><a href="index.html"><h4>Online Store</h4></a></span>
              </div>
              <div class="phone">
                <span class="text"> <a href="index.html#collection"><h4>Our Collection</h4></a></span>
              </div>
              <div class="email">
                <span class="text"> <a href="index.html#arrivals"><h4>Promotions</h4></a></span>
              </div>
              <div class="email">
                <span class="text"> <a href="index.html#best-deal"><h4>Top Brands</h4></a></span>
              </div>
            </div>
          </div>
  
          <div class="right box">
            <h2>Contact us</h2>
            <div class="content">
              <form action="#">
                <div class="email">
                  <div class="text">Email *</div>
                  <input type="email" required>
                </div>
                <div class="msg">
                  <div class="text">Message *</div>
                  <textarea rows="2" cols="25" required></textarea>
                </div>
                <div class="btn">
                  <button type="submit">Send</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </footer>

    <script src="js/products.js"></script>
    <script src="js/details.js"></script>
</body>
</html>
